name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Locate project directory
        id: proj
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "./gradlew" ] && ([ -f "./settings.gradle" ] || [ -f "./settings.gradle.kts" ]); then
            echo "dir=." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIR="$(find . -maxdepth 4 -type f -name gradlew -print -quit | xargs -r dirname)"
          if [ -z "${DIR:-}" ]; then
            echo "Cannot find gradlew in repository. Files:"
            find . -maxdepth 3 -type f | sed 's|^\./||'
            exit 1
          fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Fix Android SDK env vars
        shell: bash
        run: |
          if [ -z "${ANDROID_SDK_ROOT:-}" ] && [ -n "${ANDROID_HOME:-}" ]; then
            echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> "$GITHUB_ENV"
          fi

      - name: Install Android SDK packages
        shell: bash
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set"
            exit 1
          fi

          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ] && [ -x "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"
          fi
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found"
            ls -la "$SDK_DIR" || true
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Configure local.properties
        shell: bash
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "sdk.dir=${SDK_DIR}" > local.properties

      - name: Build Debug APK
        shell: bash
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.proj.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
